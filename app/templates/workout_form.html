{% extends "authenticated-base.html" %}
{% block title %}{{ 'Edit' if workout else 'New' }} Workout – Flexify{% endblock %}

{% block subpage_content %}
<div class="mb-3">
  <a href="/workouts" class="text-decoration-none text-muted small">
    <span class="material-symbols-outlined" style="font-size:1rem;vertical-align:middle">arrow_back</span> Back to Workouts
  </a>
</div>

<div class="card p-4" style="max-width:620px">
  <h4 class="fw-bold mb-4">{{ 'Edit Workout' if workout else '➕ New Workout' }}</h4>

  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Workout Name *</label>
      <input type="text" name="name" class="form-control" value="{{ workout.name if workout else '' }}" placeholder="e.g. Barbell Bench Press" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Description</label>
      <textarea name="description" class="form-control" rows="3" placeholder="Describe this exercise…">{{ workout.description if workout else '' }}</textarea>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Muscle Group *</label>
        <select name="muscle_group" class="form-select" required>
          {% for mg in muscle_groups %}
          <option value="{{ mg }}" {{ 'selected' if workout and workout.muscle_group == mg }}>{{ mg }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Difficulty *</label>
        <select name="difficulty" class="form-select" required>
          {% for d in difficulties %}
          <option value="{{ d }}" {{ 'selected' if workout and workout.difficulty == d }}>{{ d }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <label class="form-label fw-semibold">Duration (minutes)</label>
        <input type="number" name="duration_minutes" class="form-control" value="{{ workout.duration_minutes if workout else 30 }}" min="1">
      </div>
      <div class="col-md-6">
        <label class="form-label fw-semibold">Equipment</label>
        <input type="text" name="equipment" class="form-control" value="{{ workout.equipment if workout else 'None' }}" placeholder="e.g. Barbell, Dumbbells">
      </div>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-flexify">{{ 'Save Changes' if workout else 'Create Workout' }}</button>
      <a href="/workouts" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
