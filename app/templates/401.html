{% extends "base.html" %}
{% block title %}Unauthorized – Flexify{% endblock %}
{% block internal_css %}
<style>
  * { font-family: 'Inter', sans-serif; }
  body { min-height: 100vh; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); display: flex; align-items: center; justify-content: center; }
  .err-card { background: #fff; border-radius: 1.5rem; padding: 3rem; text-align: center; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .brand { font-size: 1.8rem; font-weight: 800; color: #0f0c29; }
  .brand span { color: #7c3aed; }
</style>
{% endblock %}
{% block content %}
<div class="err-card">
  <div class="brand mb-3">Flex<span>ify</span></div>
  <div style="font-size:3rem">🔒</div>
  <h3 class="fw-bold mt-3">Access Denied</h3>
  <p class="text-muted">You need to be logged in to access this page.</p>
  <a href="/login" class="btn btn-flexify mt-2">Go to Login</a>
</div>
{% endblock %}
